name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uv run --group lint ruff check .
      - name: Ruff format check
        run: uv run --group lint ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }} - ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Floor + current latest stable. uv has no "latest" wildcard, so bump
        # the ceiling by hand when a new stable Python is released.
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # uv provides Python (incl. macOS arm64 builds for old versions that
      # actions/setup-python lacks), so this works uniformly across all OSes.
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Cache Julia depot
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('komamripy/juliapkg.json') }}

      - name: Install package and test tools
        run: uv sync --group test --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --group test --python ${{ matrix.python-version }} pytest -v