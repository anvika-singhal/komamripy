name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff lint
        run: uvx ruff check .
      - name: Ruff format check
        run: uvx ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5

      # Cache the Julia depot (downloaded Julia + KomaMRI + precompiled cache)
      # so only the first run on a given juliapkg.json pays the full cost.
      - name: Cache Julia depot
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('komamripy/juliapkg.json') }}

      # numpy and pytest are not runtime dependencies of the package; they are
      # only needed to run the example and tests, so install them directly here.
      - name: Install package and test tools
        run: uv pip install --system -e . pytest numpy

      - name: Run tests
        run: pytest -v